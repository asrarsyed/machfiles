right_format = """$battery$time"""
# Prompt: param 2 в””в”Җ

[character]
success_symbol = " [пҒЎ ](#a9a1e1)"
error_symbol = " [пҒЎ ](#ff6c6b)"
vicmd_symbol = "[ оҳ« ](#98be65)"

# Username
[username]
style_user = "dimmed blue"

[hostname]
ssh_only = false
format = "<[$hostname]($style)>"
trim_at = "-"
style = "dimmed white"
disabled = true

[battery]
full_symbol = "п•ё"
charging_symbol = "п–ғ"
discharging_symbol = "п–Ӯ"
unknown_symbol = "п•ј"
disabled = true
format = "[ оӮ¶](fg:#ff6c6b bg:none)[$symbol ](fg:#282c34 bg:#ff6c6b)[оӮҙ ](fg:#ff6c6b bg:#ff7b7a)[$percentage]($style)[оӮҙ ](fg:#ff7b7a bg:none)"
[[battery.display]]
style = "fg:#282c34 bg:#ff7b7a"
threshold=100

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "[ оӮ¶](fg:#9088c8 bg:none)[пү’ ](fg:#282c34 bg:#9088c8)[оӮҙ ](fg:#9088c8 bg:#a9a1e1)[$duration]($style)[оӮҙ](fg:#a9a1e1 bg:none)"
disabled = false
style = "fg:#282c34 bg:#a9a1e1"

# Third param
[directory]
format = "[оӮ¶](fg:#da8548 bg:none)[п„• ](fg:#282c34 bg:#da8548)[оӮҙ](fg:#da8548 bg:#ECBE7B)[ $path]($style)[оӮҙ](fg:#ECBE7B bg:none) "
style = "fg:#282c34 bg:#ECBE7B"
truncation_length = 3
truncate_to_repo=false

[git_branch]
format = "[оӮ¶](fg:#7fa54c bg:none)[пҗҳ](fg:#282c34 bg:#7fa54c)[оӮҙ](fg:#7fa54c bg:#98be65)[ $branch]($style)[оӮҙ](fg:#98be65 bg:none) "
style = "fg:#282c34 bg:#98be65"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "green"

[git_status]
format="[оӮ¶](fg:#3896d6 bg:none)[оңҲ ](fg:#282c34 bg:#3896d6)[оӮҙ ](fg:#3896d6 bg:#51afef)[$modified](fg:#282c34 bg:#51afef)[$untracked](fg:#282c34 bg:#51afef)[$staged](fg:#282c34 bg:#51afef)[$renamed](fg:#282c34 bg:#51afef)[оӮҙ](fg:#51afef bg:none)"
conflicted = "="
ahead =	"вҮЎ${count} "
behind = "вҮЈ${count} "
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "В»${count} "
deleted = "вңҳ${count} "
style =	"red"
disabled = false

[git_state]
rebase = "REBASING"
merge =	"MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style =	"yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '
disabled = false

[hg_branch]
symbol = "пҗҳ"
style = "purple"
format = "on [$symbol$branch]($style) "

[time]
style="fg:#282c34 bg:#51afef"
format="[оӮ¶](fg:#3896d6 bg:none)[пҖ— ](fg:#282c34 bg:#3896d6)[оӮҙ](fg:#3896d6 bg:#51afef)[ $time]($style)[оӮҙ](fg:#51afef bg:none)"
time_format = "%R"
